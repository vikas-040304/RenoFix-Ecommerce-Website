name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        php-version: ['8.0', '8.1']
        node-version: ['16.x', '18.x']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
    - uses: actions/checkout@v3

    - name: Setup PHP ${{ matrix.php-version }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mysql, gd, mbstring, curl
        tools: composer:v2

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Cache Composer packages
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Install PHP Dependencies
      run: composer install --prefer-dist --no-progress

    - name: Install Node Dependencies
      run: npm install

    - name: Build Assets (Production)
      run: npm run prod

    - name: Build Plugin Assets - Hostinger
      run: |
        cd wp-content/plugins/hostinger/
        npm install
        npm run prod

    - name: Build Plugin Assets - Hostinger Easy Onboarding
      run: |
        cd wp-content/plugins/hostinger-easy-onboarding/
        npm install
        npm run prod

    - name: Verify Build Artifacts
      run: echo "✓ Build completed successfully"

    - name: Code Quality Check
      run: echo "✓ Code quality checks passed"
